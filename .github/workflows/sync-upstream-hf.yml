name: Sync upstream & rebuild HF Space

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/realbestia1/erdb.git || true
          git fetch upstream main

      - name: Check for new upstream commits
        id: check
        run: |
          NEW_COMMITS=$(git rev-list HEAD..upstream/main --count)
          echo "new_commits=$NEW_COMMITS" >> "$GITHUB_OUTPUT"

          if [ "$NEW_COMMITS" -gt 0 ]; then
            echo "Found $NEW_COMMITS new upstream commits"
          else
            echo "Already up to date with upstream"
          fi

      - name: Merge upstream changes
        if: steps.check.outputs.new_commits != '0'
        run: |
          git merge upstream/main --no-edit --strategy-option theirs || {
            git checkout --theirs .
            git add -A
            git commit --no-edit -m "Merge upstream (resolved conflicts with upstream)"
          }

      - name: Apply HF Spaces patches
        if: steps.check.outputs.new_commits != '0'
        run: |
          chmod +x scripts/apply-hf-patches.sh
          bash scripts/apply-hf-patches.sh

          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add -A
            git commit -m "Auto-apply HF Spaces patches after upstream sync"
          else
            echo "No patch changes needed"
          fi

      - name: Push to GitHub fork
        if: steps.check.outputs.new_commits != '0'
        run: |
          git push origin main

      - name: Trigger HF Space rebuild
        if: steps.check.outputs.new_commits != '0'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Il Dockerfile dello Space fa git clone dal fork a build-time,
          # quindi basta un factory-reboot per prendere il codice nuovo
          RESPONSE=$(curl -s -X POST \
            "https://huggingface.co/api/spaces/Rudm4n/RatingCasa2026/restart?factory=true" \
            -H "Authorization: Bearer ${HF_TOKEN}")
          echo "HF Response: $RESPONSE"

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.new_commits }}" != "0" ]; then
            echo "### Sync completed" >> $GITHUB_STEP_SUMMARY
            echo "- Merged **${{ steps.check.outputs.new_commits }}** new commits from upstream" >> $GITHUB_STEP_SUMMARY
            echo "- Applied HF patches and synced GitHub fork" >> $GITHUB_STEP_SUMMARY
            echo "- Triggered factory rebuild on [HF Space](https://huggingface.co/spaces/Rudm4n/RatingCasa2026)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### No changes" >> $GITHUB_STEP_SUMMARY
            echo "Fork is already up to date with upstream." >> $GITHUB_STEP_SUMMARY
          fi
